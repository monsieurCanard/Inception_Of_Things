apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gitlab
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
      - name: gitlab
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: 80
        env:
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url '{{ .Values.externalUrl }}'
            nginx['listen_https'] = false
            prometheus_monitoring['enable'] = {{ .Values.performance.prometheusEnabled }}
            sidekiq['max_concurrency'] = {{ .Values.performance.sidekiqConcurrency }}